<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark outer background -->
  <rect width="32" height="32" rx="6" fill="#0f1117"/>
  <!-- White inner — letters punch through this -->
  <rect x="2" y="2" width="28" height="28" rx="4" fill="white"/>
  <!-- I — vertical bar -->
  <rect x="5.5" y="7.5" width="4.5" height="17" rx="0.5" fill="#0f1117"/>
  <!-- A — left leg -->
  <line x1="14" y1="24.5" x2="20.5" y2="7.5" stroke="#0f1117" stroke-width="3.5" stroke-linecap="butt"/>
  <!-- A — right leg -->
  <line x1="27" y1="24.5" x2="20.5" y2="7.5" stroke="#0f1117" stroke-width="3.5" stroke-linecap="butt"/>
  <!-- A — crossbar -->
  <rect x="16.5" y="17" width="8" height="2.5" fill="#0f1117"/>
</svg>
