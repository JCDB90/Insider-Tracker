# ─────────────────────────────────────────────────────────────────────────────
# Weekly Earnings Calendar Fetcher
#
# Source: Finnhub (primary) — free tier, bare-ticker with exchange validation
# Coverage: ~1-5% of European tickers (cross-listed companies only).
#   Full EU coverage requires Finnhub paid plan (~$49/mo).
#
# Schedule: Every Sunday at 06:00 UTC
# Runtime:  ~388 tickers × 220ms = ~4 min
#
# Secrets required:
#   SUPABASE_URL      — Supabase project URL
#   SUPABASE_KEY      — service_role key (bypasses RLS for writes)
#   FINNHUB_API_KEY   — finnhub.io free API key
#   FMP_API_KEY       — financialmodelingprep.com key (currently unused; FMP
#                       free tier has no per-company EU endpoint)
# ─────────────────────────────────────────────────────────────────────────────

name: Weekly Earnings Calendar

on:
  schedule:
    - cron: '0 6 * * 0'   # Every Sunday 06:00 UTC

  workflow_dispatch:        # Manual trigger from Actions tab

env:
  SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY:      ${{ secrets.SUPABASE_KEY }}
  FINNHUB_API_KEY:   ${{ secrets.FINNHUB_API_KEY }}
  FMP_API_KEY:       ${{ secrets.FMP_API_KEY }}
  NODE_ENV: production

jobs:
  fetch-earnings:
    name: Fetch earnings dates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: 📅 Fetch earnings calendar
        run: node scrapers/earnings_fetcher.js

      - name: Summary
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Earnings Calendar — weekly fetch done"
          echo "  Time: $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
