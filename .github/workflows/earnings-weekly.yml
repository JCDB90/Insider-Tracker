# ─────────────────────────────────────────────────────────────────────────────
# Weekly Earnings Calendar Fetcher
#
# Fetches earnings dates from Yahoo Finance for all tickers in the DB
# and stores them in the earnings_calendar Supabase table.
#
# Schedule: Every Sunday at 06:00 UTC (before markets open in Asia)
# Runtime:  ~335 tickers × ~220ms = ~5 min
#
# Requires:
#   SUPABASE_URL  — set in Settings → Secrets → Actions
#   SUPABASE_KEY  — service_role key (write access)
#
# First run: also requires migrations/005_earnings_calendar.sql to be
# executed in the Supabase dashboard.
# ─────────────────────────────────────────────────────────────────────────────

name: Weekly Earnings Calendar

on:
  schedule:
    - cron: '0 6 * * 0'   # Every Sunday 06:00 UTC

  workflow_dispatch:        # Manual trigger from Actions tab

env:
  SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY:      ${{ secrets.SUPABASE_KEY }}
  FINNHUB_API_KEY:   ${{ secrets.FINNHUB_API_KEY }}
  FMP_API_KEY:       ${{ secrets.FMP_API_KEY }}
  NODE_ENV: production

jobs:
  fetch-earnings:
    name: Fetch earnings dates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: 📅 Fetch earnings calendar
        run: node scrapers/earnings_fetcher.js

      - name: Summary
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Earnings Calendar — weekly fetch done"
          echo "  Time: $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
